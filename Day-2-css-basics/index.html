<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <Style>
        body{
            background-color: lightblue;
            font-family: Arial;
        }
        form{
            width: 300px;
            margin: auto;
            padding: 20px;
            border: 2px solid black;
            background-color: white;
        }
        input{
            width: 90%;
            padding: 8px;
        }
        button{
            background-color:green;
            color: white;
            padding: 8px;
            border: none;
            margin-top: 2%;
        }
        h1{
            color: darkblue;
        }
        table{
            margin: auto;
            margin-top: 20px;
            border-collapse: collapse;
            width: 60%;
        }
        th,td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th{
            background-color: gray;
        }
    </Style>
</head>
<body>
    <header>
        <h1>Student Registration Form</h1>
    </header>
    <section>
        <h2>Enter Student Information</h2>
        <Form>
            <label for="name">Name:</label><br>
            <input type="text"><br>
            <label for="email">Email:</label><br>
            <input type="email"><br>
            <label for="password">Password:</label><br>
            <input type="password"><br>
            <label for="age">Age:</label><br>
            <input type="number"><br>
            <button>Submit</button>
        </Form>
    </section>
    <section>
        <h2>Student List</h2>
        <table>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Email</th>
            </tr>
            <tr>
                <td>Ashraf</td>
                <td>22</td>
                <td>ashraf12@gmail.com</td>
            </tr>
        </table>
    </section>
    <footer>
        <p>Created by yousuf</p>
    </footer>
</body>
</html>
